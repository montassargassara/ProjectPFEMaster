# ==============================
# SERVER CONFIGURATION
# ==============================
server.port=8080
server.servlet.context-path=
server.error.include-message=always
server.error.include-binding-errors=always

# ==============================
# TOMCAT CONFIGURATION - 1GB
# ==============================
server.tomcat.max-http-form-post-size=1024MB  
server.tomcat.max-http-post-size=1024MB       
server.tomcat.max-swallow-size=-1
server.tomcat.connection-timeout=120s

# ==============================
# MULTIPART FILE UPLOAD - 1GB
# ==============================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=1024MB    
spring.servlet.multipart.max-request-size=1024MB 
spring.servlet.multipart.file-size-threshold=2KB
spring.servlet.multipart.location=${java.io.tmpdir}
spring.servlet.multipart.resolve-lazily=true

# ✅ SUPPRIMEZ CES LIGNES SI VOUS LES AVEZ (conflit)
# spring.web.multipart.max-file-size=1024MB
# spring.web.multipart.max-request-size=1024MB

# ==============================
# DATABASE CONFIGURATION
# ==============================
spring.datasource.url=jdbc:mysql://localhost:3306/immobilierdtb?useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true

# ==============================
# JWT Configuration
# ==============================
app.jwt.secret=superAdminSecretKeyForJwtSigning1234567890!
app.jwt.expiration=86400000

# ==============================
# Spring Security
# ==============================
spring.security.filter.order=0

# ==============================
# Logging
# ==============================
logging.level.com.immobilier.backend=DEBUG
logging.level.org.springframework.web.multipart=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.security=INFO


# Add these to your existing application.properties
spring.http.multipart.enabled=true
spring.http.multipart.max-file-size=1024MB
spring.http.multipart.max-request-size=1024MB

# Better compression for 3D models
server.compression.enabled=true
server.compression.mime-types=model/gltf-binary,application/octet-stream,model/gltf+json
server.compression.min-response-size=1024

# Increase timeout for large file transfers
spring.mvc.async.request-timeout=180000

# Add CORS configuration for 3D model loading
spring.web.cors.allowed-origins=*
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true
spring.web.cors.max-age=3600